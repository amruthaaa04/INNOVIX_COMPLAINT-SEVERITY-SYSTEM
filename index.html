<!DOCTYPE html>
<html>
<head>
<title>Complaint System</title>
<style>
body { font-family:Arial; background:#f4f6f9; display:flex; justify-content:center; align-items:center; height:100vh; }
.card { background:white; padding:20px; width:400px; border-radius:8px; }
textarea { width:100%; height:80px; }
button { width:100%; padding:10px; background:#007bff; color:white; border:none; }
</style>
</head>

<body>

<div class="card">
<h2>Submit Complaint</h2>

<form id="form">

<input type="text" placeholder="Your Name"><br><br>

<select>
<option>Emergency</option>
<option>Infrastructure</option>
<option>Maintenance</option>
</select><br><br>

<textarea id="complaint" placeholder="Describe your issue..."></textarea>

<div id="suggestion" style="font-size:12px;"></div>

<button type="submit">Submit</button>

</form>

<div id="popup"></div>

<br>
<a href="/admin">Go to Admin Dashboard</a>

</div>

<script>
document.getElementById("complaint").addEventListener("input", function(){
    let t=this.value.toLowerCase();
    let s="";
    if(t.includes("gas")||t.includes("fire")) s="⚠️ Emergency complaint detected";
    else if(t.includes("road")) s="🛣️ Infrastructure issue";
    document.getElementById("suggestion").innerText=s;
});

document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let text=document.getElementById("complaint").value;

    if(text.trim()===""){
        alert("Enter complaint");
        return;
    }

    fetch("/submit",{
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:"complaint="+encodeURIComponent(text)
    })
    .then(res=>res.json())
    .then(data=>{
        let p=document.getElementById("popup");

        if(data.status==="duplicate"){
            p.innerHTML="⚠️ Duplicate<br>Count:"+data.count+" Priority:"+data.priority;
        } else {
            p.innerHTML="✅ Submitted<br>Severity:"+data.severity+" Priority:"+data.priority;
        }
    });
});
</script>

</body>
</html>
